<div class="w-full max-w-4xl mx-auto p-8 bg-white shadow-lg rounded-xl flex flex-col mt-8">
    <h2 class="text-3xl font-bold text-center mb-6 text-gray-800">Editar Materia</h2>
  
    <div class="mb-8">
      <h3 class="text-xl font-semibold mb-6 text-gray-700">Modifica los detalles de la materia</h3>
      <form (ngSubmit)="updateSubject()" class="space-y-6">
        <!-- Nombre de la Materia -->
        <div>
          <label for="name" class="block text-lg font-medium text-gray-600 mb-2">Nombre de la Materia</label>
          <input type="text" id="name" [(ngModel)]="name" name="name" class="border p-3 rounded-md w-full" required />
        </div>
    
        <!-- Código de la Materia -->
        <div>
          <label for="code" class="block text-lg font-medium text-gray-600 mb-2">Código de la Materia</label>
          <input type="text" id="code" [(ngModel)]="code" name="code" class="border p-3 rounded-md w-full" required />
        </div>
    
        <!-- Facultad -->
        <div>
          <label for="faculty" class="block text-lg font-medium text-gray-600 mb-2">Facultad</label>
          <select id="faculty" [(ngModel)]="id_faculty" name="id_faculty" class="border p-3 rounded-md w-full" required>
            <option *ngFor="let faculty of faculties" [value]="faculty.id">{{ faculty.name }}</option>
          </select>
        </div>
    
        <!-- Botones -->
        <div class="flex justify-end space-x-4">
          <button type="button" (click)="cancel()" class="bg-gray-500 text-white py-3 px-6 rounded-md hover:bg-gray-600">
            Cancelar
          </button>
          <button type="submit" class="bg-green-600 hover:bg-green-700 text-white py-3 px-6 rounded-md">
            Guardar Cambios
          </button>
        </div>
      </form>
    </div>
  </div>
