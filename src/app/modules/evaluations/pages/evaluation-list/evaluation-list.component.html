<div class="container mx-auto mt-10 p-4">
  <h2 class="text-2xl font-semibold text-gray-800 mb-6">Listado de Evaluaciones</h2>

  <!-- Filtros y opciones -->
  <div class="flex justify-between items-center mb-4">
    <!-- Selector de elementos por página -->
    <div>
      <label for="itemsPerPage" class="text-sm text-gray-600">Items por página:</label>
      <select id="itemsPerPage" [(ngModel)]="itemsPerPage" (change)="updateItemsPerPage($event)" class="ml-2 p-1 border rounded">
        <option [value]="5">5</option>
        <option [value]="10">10</option>
        <option [value]="15">15</option>
        <option [value]="20">20</option>
      </select>
    </div>

    <!-- Botones de Crear Evaluación y Exportar a Excel -->
    <div class="flex space-x-4">
      <button (click)="navigateToCreateEvaluation()" class="bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded">
        Crear Evaluación
      </button>
      <button (click)="exportToExcel()" class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded">
        Exportar a Excel
      </button>
    </div>
  </div>

  <!-- Tabla de evaluaciones -->
  <table class="min-w-full bg-white shadow-md rounded-lg overflow-hidden">
    <thead class="bg-gray-200">
      <tr>
        <th class="p-3 text-left text-base font-semibold text-gray-700 cursor-pointer" (click)="toggleSort('id')">
          ID
          <span *ngIf="sortBy === 'id' && sortDirection === 'asc'">🔼</span>
          <span *ngIf="sortBy === 'id' && sortDirection === 'desc'">🔽</span>
        </th>
        <th class="p-3 text-left text-base font-semibold text-gray-700 cursor-pointer" (click)="toggleSort('name')">
          Nombre
          <span *ngIf="sortBy === 'name' && sortDirection === 'asc'">🔼</span>
          <span *ngIf="sortBy === 'name' && sortDirection === 'desc'">🔽</span>
        </th>
        <th class="p-3 text-left text-base font-semibold text-gray-700">Materia</th>
        <th class="p-3 text-left text-base font-semibold text-gray-700">Facultad</th>
        <th class="p-3 text-left text-base font-semibold text-gray-700">Usuario</th>
        <th class="p-3 text-center text-base font-semibold text-gray-700">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <ng-container *ngFor="let evaluation of evaluations | slice:(currentPage - 1) * itemsPerPage:(currentPage) * itemsPerPage">
        <tr>
          <td class="p-3 text-base text-gray-600">{{ evaluation.id }}</td>
          <td class="p-3 text-base text-gray-600">{{ evaluation.name }}</td>
          <td class="p-3 text-base text-gray-600">{{ evaluation.id_subject }}</td>
          <td class="p-3 text-base text-gray-600">{{ evaluation.id_faculty }}</td>
          <td class="p-3 text-base text-gray-600">{{ evaluation.id_user }}</td>
          <td class="p-3 text-center">
            <!-- Botón para Editar Evaluación -->
            <button (click)="viewEvaluation(evaluation.id)" class="bg-blue-400 hover:bg-blue-500 text-white text-sm font-medium py-2 px-3 rounded transition duration-150">
              Editar
            </button>

            <!-- Botón para Eliminar Evaluación -->
            <button (click)="deleteEvaluation(evaluation)" class="bg-red-500 hover:bg-red-600 text-white text-sm font-medium py-2 px-3 ml-2 rounded transition duration-150">
              Eliminar
            </button>
          </td>
        </tr>
      </ng-container>
    </tbody>
  </table>

  <!-- Paginación -->
  <div class="flex justify-between items-center mt-6">
    <button (click)="prevPage()" [disabled]="currentPage === 1" class="bg-gray-200 hover:bg-gray-300 text-gray-600 text-sm font-medium py-1 px-3 rounded transition duration-150">
      Página anterior
    </button>

    <span class="text-sm text-gray-600">Página {{ currentPage }}</span>

    <button (click)="nextPage()" [disabled]="evaluations.length < itemsPerPage" class="bg-gray-200 hover:bg-gray-300 text-gray-600 text-sm font-medium py-1 px-3 rounded transition duration-150">
      Siguiente página
    </button>
  </div>
</div>
