<!-- Contenido principal -->
<div class="w-full max-w-6xl mx-auto p-10 bg-white shadow-lg rounded-xl flex flex-col mt-12">
  <h2 class="text-4xl font-bold text-center mb-8 text-gray-800">Evaluación de Competencias</h2>

  <form (ngSubmit)="submitForm()" class="space-y-8">
    <!-- Iterar sobre las preguntas obtenidas de la API -->
    <div *ngFor="let question of questions">
      <label class="block text-2xl font-medium text-gray-700 mb-3">
        {{ question.question }}
      </label>
      <div class="flex space-x-6">
        <label class="flex items-center text-xl">
          <input
            type="radio"
            [name]="'question_' + question.id"
            [(ngModel)]="form['question_' + question.id]"
            [value]="true"
            required
            class="mr-3 h-6 w-6"
          />
          Sí
        </label>
        <label class="flex items-center text-xl">
          <input
            type="radio"
            [name]="'question_' + question.id"
            [(ngModel)]="form['question_' + question.id]"
            [value]="false"
            class="mr-3 h-6 w-6"
          />
          No
        </label>
      </div>
    </div>

    <!-- Botones de enviar -->
    <div class="flex justify-end space-x-6">
      <button
        *ngIf="!isSaving"
        type="button"
        (click)="cancel()"
        class="bg-gray-500 text-white py-4 px-8 rounded-md hover:bg-gray-600 text-xl"
      >
        Cancelar
      </button>
      <button
        *ngIf="!isSaving"
        type="submit"
        class="bg-green-600 hover:bg-green-700 text-white py-4 px-8 rounded-md text-xl"
      >
        Guardar Respuesta
      </button>
    </div>
  </form>
</div>
