<div class="flex justify-center items-center min-h-screen">
    <div class="bg-white shadow-lg rounded-lg p-6 w-96 border border-gray-300">
      <h2 class="text-2xl font-semibold mb-4 text-center">Detalles del Rol</h2>
      <ul>
        <li class="mb-2"><strong>Nombre del Rol:</strong> {{ role?.role_name }}</li>
        <li class="mb-2"><strong>ID del Rol:</strong> {{ role?.id }}</li>
        <li class="mb-2"><strong>Fecha de Creación:</strong> {{ role?.created_at | date:'short' }}</li>
        <li class="mb-2"><strong>Última Actualización:</strong> {{ role?.updated_at | date:'short' }}</li>
      </ul>
  
      <div class="mt-6 flex justify-between">
        <button routerLink="/roles/update/{{role.id}}" class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded">
          Editar Rol
        </button>
        <button routerLink="/roles/pdf/{{role.id}}" class="bg-customPurple-100 hover:bg-customPurple-400 text-white py-2 px-4 rounded">
          Generar PDF
        </button>
      </div>
    </div>
  </div>
