<div class="w-full max-w-4xl mx-auto p-8 bg-white shadow-lg rounded-xl flex flex-col mt-8">
  <h2 class="text-3xl font-bold text-center mb-6 text-gray-800">Editar Rol</h2>

  <div class="mb-8">
    <h3 class="text-xl font-semibold mb-6 text-gray-700">Modifica los detalles del rol</h3>
    <form (ngSubmit)="updateRole()" class="space-y-6">
      
      <!-- Campo Nombre del Rol -->
      <div>
        <label for="role_name" class="block text-lg font-medium text-gray-600 mb-2">Nombre del Rol</label>
        <input type="text" id="role_name" [(ngModel)]="role_name" name="role_name" 
               class="border p-3 rounded-md w-full text-lg" placeholder="Ingresa el nombre del rol" required>
      </div>

      <!-- Botones de acción -->
      <div class="flex justify-end space-x-4">
        <button type="button" (click)="cancel()" class="bg-gray-500 text-white py-3 px-6 rounded-md hover:bg-gray-600 text-lg">
          Cancelar
        </button>
        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white py-3 px-6 rounded-md text-lg">
          Guardar Cambios
        </button>
      </div>
    </form>
  </div>
</div>
