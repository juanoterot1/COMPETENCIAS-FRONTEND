<div class="w-full max-w-4xl mx-auto p-8 bg-white shadow-lg rounded-xl flex flex-col mt-8">
  <h2 class="text-3xl font-bold text-center mb-6">Crear Nueva Grading Matrix</h2>

  <form (ngSubmit)="createGradingMatrix()" class="space-y-6">
    
    <!-- Select para ID Subject -->
    <div>
      <label for="id_subject" class="block text-lg font-medium">Materia</label>
      <select id="id_subject" [(ngModel)]="id_subject" name="id_subject" class="border p-3 rounded-md w-full" required>
        <option *ngFor="let subject of subjects" [value]="subject.id">{{ subject.name }}</option>
      </select>
    </div>

    <!-- Total Evaluations -->
    <div>
      <label for="total_evaluations" class="block text-lg font-medium">Total Evaluations</label>
      <input type="number" id="total_evaluations" [(ngModel)]="total_evaluations" name="total_evaluations" class="border p-3 rounded-md w-full" required />
    </div>

    <!-- Total Score -->
    <div>
      <label for="total_score" class="block text-lg font-medium">Total Score</label>
      <input type="number" id="total_score" [(ngModel)]="total_score" name="total_score" step="0.01" class="border p-3 rounded-md w-full" required />
    </div>

    <!-- Recommendation -->
    <div>
      <label for="recommendation" class="block text-lg font-medium">Recommendation</label>
      <input type="text" id="recommendation" [(ngModel)]="recommendation" name="recommendation" class="border p-3 rounded-md w-full" required />
    </div>

    <!-- Score -->
    <div>
      <label for="score" class="block text-lg font-medium">Score</label>
      <input type="number" id="score" [(ngModel)]="score" name="score" step="0.01" class="border p-3 rounded-md w-full" required />
    </div>

    <!-- Document -->
    <div>
      <label for="document" class="block text-lg font-medium">Document</label>
      <input type="text" id="document" [(ngModel)]="document" name="document" class="border p-3 rounded-md w-full" />
    </div>

    <!-- Botones -->
    <div class="flex justify-end space-x-4">
      <button type="button" (click)="cancel()" class="bg-gray-500 text-white py-3 px-6 rounded-md hover:bg-gray-600">Cancelar</button>
      <button type="submit" class="bg-green-600 hover:bg-green-700 text-white py-3 px-6 rounded-md">Crear</button>
    </div>
  </form>
</div>
